<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個人學習歷程檔案</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --bg-color: #f8fafc;
            --text-color: #334155;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            line-height: 1.6;
        }

        /* 側邊導覽列 (恢復條列式) */
        nav {
            width: 260px;
            height: 100vh;
            background-color: var(--primary-color);
            color: white;
            position: fixed;
            padding: 50px 25px;
            box-sizing: border-box;
            box-shadow: 4px 0 10px rgba(0,0,0,0.1);
        }

        nav h2 {
            font-size: 1.4rem;
            letter-spacing: 2px;
            margin-bottom: 40px;
            border-bottom: 2px solid var(--accent-color);
            padding-bottom: 10px;
        }

        nav ul {
            list-style: none;
            padding: 0;
        }

        nav ul li {
            margin-bottom: 20px;
        }

        nav ul li a {
            color: #cbd5e1;
            text-decoration: none;
            font-size: 1.1rem;
            transition: all 0.3s;
            display: block;
        }

        nav ul li a:hover {
            color: white;
            padding-left: 10px;
        }

        /* 主內容區 */
        main {
            margin-left: 260px;
            padding: 60px 50px;
            width: calc(100% - 260px);
            box-sizing: border-box;
        }

        /* 簡歷上方的照片樣式 */
        .resume-header {
            margin-bottom: 30px;
        }

        .profile-img-content {
            width: 150px;
            height: 150px;
            border-radius: 12px; /* 這裡改為稍微圓角，看起來更專業 */
            object-fit: cover;
            border: 4px solid white;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            margin-bottom: 15px;
        }

        section {
            margin-bottom: 60px;
        }

        h3 {
            font-size: 1.75rem;
            margin-bottom: 30px;
            color: var(--primary-color);
            display: flex;
            align-items: center;
        }

        h3::after {
            content: "";
            flex: 1;
            height: 1px;
            background: #e2e8f0;
            margin-left: 20px;
        }

        /* 網格佈局 */
        .grid-three {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
        }

        .grid-two {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 25px;
        }

        .card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            text-decoration: none;
            color: inherit;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
            transition: all 0.3s ease;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 25px rgba(0,0,0,0.1);
            border-color: var(--accent-color);
        }

        .card h4 { margin: 0 0 10px 0; color: var(--primary-color); }
        .card p { margin: 0; font-size: 0.95rem; color: #64748b; }

        /* 響應式 */
        @media (max-width: 1024px) {
            .grid-three { grid-template-columns: repeat(2, 1fr); }
        }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            nav { width: 100%; height: auto; position: relative; padding: 30px; }
            main { margin-left: 0; width: 100%; padding: 40px 20px; }
            .grid-three, .grid-two { grid-template-columns: 1fr; }
            .profile-img-content { width: 120px; height: 120px; }
        }
    </style>
</head>
<body>

    <nav>
        <h2>學習檔案管理</h2>

            <li><a href="#resume">個人簡歷</a></li>

            <li><a href="#portfolio">作品集展示</a></li>
        </ul>
    </nav>

                <img src="686540972_1003108218996838_5756587725094398876_n.jpg" alt="個人照" class="profile-img-content">
            </div>
            <h3>簡歷</h3>
            <div style="max-width: 400px;">
                <a href="簡歷.html" class="card">
                    <h4>我的個人簡歷</h4>
                    <p>專業技能、學歷背景與社團經歷彙整。</p>

            </div>

                </a>

                    <h4>綜整心得</h4>
                    <p>對過往學習歷程的深度總結與反思。</p>
                </a>
            </div>
        </section>

        <section id="portfolio">
            <h3>作品集</h3>
            <div class="grid-three">
                <a href="iPhone捷徑製作.html" class="card">
                    <h4>iPhone 捷徑製作</h4>
                    <p>iOS 自動化工作流設計。</p>
                </a>
                <a href="Github_web.html" class="card">
                    <h4>網頁設計 Github Web</h4>
                    <p>前端開發專案原始碼。</p>
                </a>
                <a href="生科課成品.html" class="card">
                    <h4>生科課成品</h4>
                    <p>實作課程成果紀錄。</p>
                </a>
                <a href="JAVA小遊戲-數字拼圖.html" class="card">
                    <h4>JAVA 數字拼圖</h4>

                </a>
                <a href="PS修圖作品集.html" class="card">
                    <h4>PS 修圖作品集</h4>
                    <p>影像美化與創意合成。</p>
                </a>
                <a href="微積分期中94.html" class="card">
                    <h4>微積分期中 94</h4>
                    <p>數理邏輯能力的學習見證。</p>
                </a>
            </div>
        </section>
    </main>

</body>
</html>
